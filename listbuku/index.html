<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="header">
      <h1>📚 Data Buku Perpustakaan</h1>
      <p>Kelola koleksi buku dengan mudah dan cepat</p>
    </header>

    <!-- Form Input Buku -->
    <section class="card-form">
      <h2 id="judul-form">Tambah Buku Baru</h2>
      <form id="form-buku">
        <!-- Input rahasia untuk menyimpan posisi index buku saat di-EDIT -->
        <input type="hidden" id="index-buku" value="-1">

        <div class="form-group">
          <label for="judul">Judul Buku</label>
          <input type="text" id="judul" placeholder="Contoh: Laskar Pelangi" required>
        </div>

        <div class="form-group">
          <label for="penulis">Penulis</label>
          <input type="text" id="penulis" placeholder="Contoh: Andrea Hirata" required>
        </div>

        <div class="form-group">
          <label for="tahun">Tahun Terbit</label>
          <input type="number" id="tahun" placeholder="Contoh: 2005" required>
        </div>

        <div class="button-group">
          <button type="submit" id="btn-simpan" class="btn btn-navy">Tambah Buku</button>
          <button type="button" id="btn-batal" class="btn btn-batal" style="display: none;">Batal Edit</button>
        </div>
      </form>
    </section>

    <!-- Tabel Daftar Buku -->
    <section class="card-table">
      <h2>Daftar Koleksi (<span id="total-buku">0</span>)</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Judul Buku</th>
              <th>Penulis</th>
              <th>Tahun</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel-buku">
            <!-- Data dari JS akan dirender di sini -->
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
